name: Auto-suffix new files with contributor name

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  auto-suffix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Get PR author username
        id: author
        run: echo "name=${{ github.event.pull_request.user.login }}" >> $GITHUB_OUTPUT

      - name: Map GitHub username to team name
        id: teamname
        run: |
          GH_USER="${{ steps.author.outputs.name }}"
          # Map GitHub usernames to first names
          # UPDATE THIS when new GMs join — add their GitHub username
          case "$GH_USER" in
            sindy-rgb)      TEAM_NAME="sindy" ;;
            # Add GM GitHub usernames below as they onboard:
            # lays-github)  TEAM_NAME="lays" ;;
            # mariely-gh)   TEAM_NAME="mariely" ;;
            # luiz-gh)      TEAM_NAME="luiz" ;;
            # kinte-gh)     TEAM_NAME="kinte" ;;
            # aubree-gh)    TEAM_NAME="aubree" ;;
            # jay-warner)   TEAM_NAME="jay" ;;
            *)              TEAM_NAME="$GH_USER" ;;
          esac
          echo "name=$TEAM_NAME" >> $GITHUB_OUTPUT

      - name: Find and rename new files with _by-name suffix
        run: |
          AUTHOR="${{ steps.teamname.outputs.name }}"

          # Get list of new files added in this PR (compared to main)
          NEW_FILES=$(git diff --name-only --diff-filter=A origin/main...HEAD)

          if [ -z "$NEW_FILES" ]; then
            echo "No new files found"
            exit 0
          fi

          RENAMED=false

          while IFS= read -r file; do
            # Skip dotfiles, system files, and protected files
            case "$file" in
              .github/*|.obsidian/*|.gitignore|CLAUDE.md|README.md|CLIENT-INTELLIGENCE-SUMMARY.md|system/*|Archive/*)
                echo "SKIP (protected): $file"
                continue
                ;;
            esac

            BASENAME=$(basename "$file")
            DIRNAME=$(dirname "$file")

            # Check if file already has _by- suffix
            if echo "$BASENAME" | grep -q '_by-'; then
              echo "SKIP (already suffixed): $file"
              continue
            fi

            # Add _by-author before the file extension
            EXTENSION="${BASENAME##*.}"
            NAME_WITHOUT_EXT="${BASENAME%.*}"
            NEW_BASENAME="${NAME_WITHOUT_EXT}_by-${AUTHOR}.${EXTENSION}"
            NEW_NAME="${DIRNAME}/${NEW_BASENAME}"

            git mv "$file" "$NEW_NAME"
            echo "RENAMED: $file → $NEW_NAME"
            RENAMED=true

          done <<< "$NEW_FILES"

          if [ "$RENAMED" = true ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Auto-suffix new files with _by-${AUTHOR}"
            git push
          else
            echo "No files needed renaming"
          fi
